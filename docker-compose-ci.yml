services:
  app:
    image: enbot-image:latest
    container_name: 'enbot'
    restart: on-failure
    networks:
      - botNetwork
    #    command: [ "uv", "run", "app/main.py" ]
    depends_on:
      - nats

  ai:
    image: ai-image:latest
    container_name: 'ai'
    restart: on-failure
    command: [ "uv", "run", "main.py" ]
    networks:
      - botNetwork
    depends_on:
      - nats

  nats-migrate:
    image: nats-mg-image:latest
    command: [ "uv", "run", "migration.py" ]
    restart: no
    networks:
      - botNetwork
    volumes:
      - ./nats-mg/data:/data
      - ./nats-mg/nats.conf:/config/nats.conf
    depends_on:
      - nats

  nats:
    image: nats:2.10.22
    container_name: 'nats'
    restart: on-failure
    entrypoint: /nats-server
    command: "-c /config/nats.conf"
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - botNetwork
    volumes:
      - ./nats-mg/data:/data
      - ./nats-mg/nats.conf:/config/nats.conf

networks:
  botNetwork:
    external: true
